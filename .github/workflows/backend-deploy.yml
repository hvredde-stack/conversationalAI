name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy convai-backend \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --quiet \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GCS_UPLOADS_BUCKET=${{ vars.GCP_PROJECT_ID }}-uploads,VERTEX_LOCATION=${{ vars.VERTEX_LOCATION }},GEMINI_MODEL=${{ vars.GEMINI_MODEL }},GEMINI_FAST_MODEL=${{ vars.GEMINI_FAST_MODEL }},APP_ENV=prod,FRONTEND_ORIGIN=${{ vars.FRONTEND_ORIGIN }}"

      - name: Print service URL
        run: |
          gcloud run services describe convai-backend \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format="value(status.url)"
